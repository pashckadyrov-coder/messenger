<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>💎 СКАМ 3.0 💎</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, 'SF Pro Text', 'Segoe UI', Roboto, system-ui, sans-serif;
            height: 100%;
            min-height: -webkit-fill-available;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        body.purple { --bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%); --card-bg: rgba(255,255,255,0.96); --text: #1a202c; --text-light: #4a5568; --border: #e2e8f0; --primary: #667eea; --primary-dark: #5a67d8; --message-in: #f7fafc; --message-out: linear-gradient(135deg, #667eea, #5a67d8); --danger: #f56565; --success: #48bb78; --online: #48bb78; }
        body.dark { --bg: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%); --card-bg: rgba(30,30,46,0.96); --text: #f7fafc; --text-light: #a0aec0; --border: #2d3748; --primary: #818cf8; --primary-dark: #6366f1; --message-in: #2d3748; --message-out: linear-gradient(135deg, #818cf8, #6366f1); --danger: #f56565; --success: #48bb78; --online: #48bb78; }
        body.ocean { --bg: linear-gradient(135deg, #00c6fb 0%, #005bea 100%); --card-bg: rgba(255,255,255,0.96); --text: #1a202c; --text-light: #4a5568; --border: #e2e8f0; --primary: #00c6fb; --primary-dark: #0099cc; --message-in: #f0f9ff; --message-out: linear-gradient(135deg, #00c6fb, #0099cc); --danger: #f56565; --success: #48bb78; --online: #48bb78; }
        body.sunset { --bg: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); --card-bg: rgba(255,255,255,0.96); --text: #1a202c; --text-light: #4a5568; --border: #e2e8f0; --primary: #f5576c; --primary-dark: #e53e3e; --message-in: #fff5f5; --message-out: linear-gradient(135deg, #f5576c, #e53e3e); --danger: #f56565; --success: #48bb78; --online: #48bb78; }
        body.forest { --bg: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); --card-bg: rgba(255,255,255,0.96); --text: #1a202c; --text-light: #4a5568; --border: #e2e8f0; --primary: #11998e; --primary-dark: #0d7a70; --message-in: #f0fdf4; --message-out: linear-gradient(135deg, #11998e, #0d7a70); --danger: #f56565; --success: #48bb78; --online: #48bb78; }
        
        body { background: var(--bg); backdrop-filter: blur(10px); }
        
        .app { max-width: 500px; margin: 0 auto; height: 100dvh; background: var(--card-bg); display: flex; flex-direction: column; position: relative; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.2); }
        
        /* ХЕДЕР */
        .header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header h1 { font-size: 20px; font-weight: 800; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 2px solid white; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-name { font-weight: 600; font-size: 14px; }
        .icon-btn { background: rgba(255,255,255,0.2); border: none; font-size: 18px; cursor: pointer; padding: 8px; border-radius: 50%; width: 36px; height: 36px; color: white; transition: all 0.2s; }
        
        .tabs { display: flex; background: var(--card-bg); border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 4px; padding: 0 8px; }
        .tab { flex: 1; padding: 12px 0; text-align: center; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-light); transition: all 0.2s; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: rgba(102,126,234,0.08); }
        
        .content { flex: 1; overflow-y: auto; background: var(--bg); }
        
        /* КОМПАКТНАЯ ПАНЕЛЬ ВВОДА */
        .input-panel { 
            padding: 10px 12px; 
            padding-bottom: max(10px, env(safe-area-inset-bottom)); 
            background: var(--card-bg); 
            border-top: 1px solid var(--border); 
            display: flex; 
            gap: 8px; 
            align-items: center; 
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .input-row { display: flex; gap: 8px; width: 100%; align-items: center; }
        .input-panel input { 
            flex: 1; 
            min-width: 0; 
            padding: 12px 16px; 
            border: 2px solid var(--border); 
            border-radius: 30px; 
            font-size: 15px; 
            background: var(--bg); 
            color: var(--text); 
            font-family: inherit;
        }
        .input-panel input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .send-btn { 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
            border: none; 
            padding: 12px 20px; 
            border-radius: 30px; 
            color: white; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.2s; 
            flex-shrink: 0;
        }
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .action-btn { 
            background: var(--border); 
            border: none; 
            font-size: 18px; 
            cursor: pointer; 
            padding: 8px; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            transition: all 0.2s; 
            color: var(--text);
            flex-shrink: 0;
        }
        .action-btn:active { transform: scale(0.95); background: var(--primary); color: white; }
        
        .chat-list { padding: 12px; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--card-bg); border-radius: 18px; margin-bottom: 8px; cursor: pointer; border: 1px solid var(--border); transition: all 0.2s; }
        .chat-item:hover { transform: translateX(4px); border-color: var(--primary); }
        .chat-avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: white; flex-shrink: 0; overflow: hidden; }
        .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 700; font-size: 15px; color: var(--text); display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .chat-preview { font-size: 11px; color: var(--text-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .online-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--online); display: inline-block; box-shadow: 0 0 4px var(--online); }
        
        .chat-window { display: flex; flex-direction: column; height: 100%; }
        .chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; background: var(--card-bg); }
        .chat-header h3 { flex: 1; font-size: 17px; font-weight: 700; color: var(--text); }
        .back-btn { background: none; border: none; font-size: 26px; cursor: pointer; color: var(--text); padding: 4px 8px; }
        
        .messages-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding: 12px; }
        .message { display: flex; width: 100%; animation: slideIn 0.2s ease; }
        .message.my { justify-content: flex-end; }
        .message-bubble { max-width: 80%; padding: 10px 14px; border-radius: 20px; word-wrap: break-word; }
        .message.my .message-bubble { background: var(--message-out); color: white; border-bottom-right-radius: 5px; }
        .message.other .message-bubble { background: var(--message-in); color: var(--text); border-bottom-left-radius: 5px; border: 1px solid var(--border); }
        .message-sender { font-size: 11px; font-weight: 600; margin-bottom: 4px; color: var(--primary); }
        .message-text { font-size: 14px; line-height: 1.4; }
        .message-image { max-width: 180px; border-radius: 14px; margin-top: 6px; cursor: pointer; }
        .message-time { font-size: 9px; margin-top: 4px; opacity: 0.6; text-align: right; }
        .typing-indicator { font-size: 11px; color: var(--text-light); padding: 4px 12px; font-style: italic; }
        
        .settings-section { background: var(--card-bg); border-radius: 20px; padding: 16px; margin: 12px; border: 1px solid var(--border); }
        .settings-title { font-weight: 700; font-size: 16px; margin-bottom: 12px; color: var(--text); }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .theme-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .theme-btn { width: 44px; height: 44px; border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        
        .login-screen { display: flex; justify-content: center; align-items: center; height: 100%; background: var(--bg); }
        .login-card { background: var(--card-bg); padding: 32px 28px; border-radius: 36px; text-align: center; width: 300px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.2); }
        .login-card h2 { margin-bottom: 24px; color: var(--primary); font-size: 24px; font-weight: 800; }
        .login-card input { padding: 12px 16px; margin: 12px 0; width: 100%; border: 2px solid var(--border); border-radius: 30px; text-align: center; background: var(--bg); color: var(--text); font-size: 15px; }
        .login-card button { padding: 12px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: 700; width: 100%; }
        
        .toast { position: fixed; bottom: 100px; left: 20px; right: 20px; background: rgba(0,0,0,0.9); color: white; padding: 12px 18px; border-radius: 50px; text-align: center; z-index: 1000; animation: fadeOut 2s forwards; font-size: 14px; }
        .sticker-panel { display: none; position: absolute; bottom: 70px; left: 0; right: 0; background: var(--card-bg); border-top: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 12px; z-index: 100; }
        .sticker-panel.show { display: block; }
        .sticker-grid { display: flex; gap: 10px; overflow-x: auto; padding: 6px; }
        .sticker { font-size: 42px; cursor: pointer; transition: transform 0.1s; padding: 4px; }
        .sticker:active { transform: scale(0.9); }
        
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: var(--card-bg); border-radius: 28px; padding: 20px; max-width: 300px; width: 90%; text-align: center; }
        .search-bar { padding: 10px 12px; background: var(--card-bg); border-bottom: 1px solid var(--border); margin: 8px; border-radius: 30px; }
        .search-bar input { width: 100%; padding: 10px 14px; border: 2px solid var(--border); border-radius: 30px; background: var(--bg); color: var(--text); font-size: 14px; }
        .qr-code { width: 180px; height: 180px; margin: 12px auto; background: white; padding: 8px; border-radius: 14px; display: flex; align-items: center; justify-content: center; word-break: break-all; font-size: 11px; }
        .call-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; }
        .call-btn { background: var(--border); border: none; font-size: 18px; cursor: pointer; padding: 8px; border-radius: 50%; width: 40px; height: 40px; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: var(--border); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        
        @media (max-width: 480px) {
            .action-btn { width: 36px; height: 36px; font-size: 16px; }
            .send-btn { padding: 10px 16px; font-size: 13px; }
            .input-panel input { padding: 10px 14px; font-size: 14px; }
        }
    </style>
</head>
<body class="purple">
    <div id="app"></div>

    <script>
        let ws = null, currentUser = '', currentChat = null, groups = [], contacts = [], allMessages = [];
        let pinnedChats = JSON.parse(localStorage.getItem('pinnedChats') || '[]'), searchQuery = '', currentImage = null, currentTab = 'chats';
        let peerConnection = null, localStream = null, currentCallWith = null, currentCallId = null;
        let notificationPermission = false;
        const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        
        if ('Notification' in window) { Notification.requestPermission().then(perm => { notificationPermission = perm === 'granted'; }); }
        
        function showToast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }
        function showNotif(title, body) { if (notificationPermission && document.hidden) { new Notification(title, { body: body, icon: '/favicon.ico' }); } }
        function showConfetti() { for (let i = 0; i < 30; i++) { const c = document.createElement('div'); c.innerHTML = ['🎉','✨','🎊','💥','⭐'][Math.floor(Math.random()*5)]; c.style.position = 'fixed'; c.style.left = Math.random()*window.innerWidth+'px'; c.style.top = '-20px'; c.style.fontSize = (Math.random()*16+12)+'px'; c.style.pointerEvents = 'none'; c.style.zIndex = '9999'; c.style.animation = `fadeOut ${Math.random()*1.5+1}s forwards`; document.body.appendChild(c); setTimeout(() => c.remove(), 2000); } }
        function setTheme(t) { document.body.className = t; localStorage.setItem('theme', t); }
        function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function getChatId(c) { return c.type === 'private' ? c.user : `group_${c.id}`; }
        function isPinned(c) { return pinnedChats.includes(getChatId(c)); }
        function togglePin(c) { const id = getChatId(c); if (pinnedChats.includes(id)) { pinnedChats = pinnedChats.filter(p=>p!==id); showToast('📌 Чат откреплён'); } else { pinnedChats.unshift(id); showToast('📌 Чат закреплён'); } localStorage.setItem('pinnedChats',JSON.stringify(pinnedChats)); render(); }
        function getAvatarHtml(u) { const c = contacts.find(c=>c.name===u); const url = c?.avatar; if(url) return `<img src="${url}">`; return u.charAt(0).toUpperCase(); }
        
        function render() {
            const app = document.getElementById('app');
            if (!currentUser) {
                app.innerHTML = `<div class="login-screen"><div class="login-card"><h2>💎 СКАМ 3.0 💎</h2><input type="text" id="loginName" placeholder="Твой ник" autocomplete="off"><button onclick="login()">🚀 Войти</button></div></div>`;
                const saved = localStorage.getItem('messenger_user');
                if (saved) document.getElementById('loginName').value = saved;
                return;
            }
            app.innerHTML = `<div class="app"><div class="header"><h1>💎 СКАМ 3.0</h1><div class="user-info"><div class="avatar" onclick="openAvatarModal()">${getAvatarHtml(currentUser)}</div><span class="user-name">${escapeHtml(currentUser)}</span><button class="icon-btn" onclick="setTab('settings')">🎨</button></div></div><div class="tabs"><div class="tab ${currentTab==='chats'?'active':''}" onclick="setTab('chats')">💬</div><div class="tab ${currentTab==='contacts'?'active':''}" onclick="setTab('contacts')">👥</div><div class="tab ${currentTab==='search'?'active':''}" onclick="setTab('search')">🔍</div><div class="tab ${currentTab==='stats'?'active':''}" onclick="setTab('stats')">📊</div><div class="tab ${currentTab==='settings'?'active':''}" onclick="setTab('settings')">⚙️</div></div><div class="content">${currentTab==='chats'?renderChats():currentTab==='contacts'?renderContacts():currentTab==='search'?renderSearch():currentTab==='stats'?renderStats():renderSettings()}</div></div>`;
            if (currentTab === 'chats' && currentChat) setTimeout(displayMessages, 50);
        }
        
        function renderChats() {
            if (currentChat) {
                return `<div class="chat-window"><div class="chat-header"><button class="back-btn" onclick="closeChat()">←</button><h3>${isPinned(currentChat)?'📌 ':''}${currentChat.type==='group'?'#':'💬'} ${escapeHtml(currentChat.type==='group'?currentChat.name:currentChat.user)}</h3><button class="icon-btn" onclick="togglePin(currentChat)">📌</button>${currentChat.type==='private'?`<button class="call-btn" onclick="startCall('${currentChat.user}',false)">🎤</button><button class="call-btn" onclick="startCall('${currentChat.user}',true)">📹</button>`:`<button class="call-btn" onclick="startGroupCall('${currentChat.id}',false)">🎤</button><button class="call-btn" onclick="startGroupCall('${currentChat.id}',true)">📹</button>`}</div><div id="typingIndicator" class="typing-indicator"></div><div class="messages-area" id="messagesArea"></div><div class="input-panel"><div class="action-buttons"><button class="action-btn" onclick="attachImage()">📎</button><button class="action-btn" onclick="toggleStickers()">😊</button><button class="action-btn" onclick="sendVoice()">🎤</button><button class="action-btn" onclick="openStickerCreator()">🎨</button></div><div class="input-row"><input type="text" id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()" oninput="onTyping()"><button class="send-btn" onclick="sendMessage()">→</button></div></div><div id="stickerPanel" class="sticker-panel"><div class="sticker-grid">${['😀','😂','🥰','😎','🔥','❤️','👍','🎉','😭','😡','🤔','👀','💀','✨','🍿','🎮','🐱','🐶','🍕','☕'].map(s=>`<span class="sticker" onclick="sendSticker('${s}')">${s}</span>`).join('')}</div></div></div>`;
            }
            let privateChats = [];
            allMessages.forEach(msg=>{if(!msg.isGroup){if(msg.from!==currentUser&&!privateChats.includes(msg.from)) privateChats.push(msg.from); if(msg.to!==currentUser&&!privateChats.includes(msg.to)) privateChats.push(msg.to);}});
            const groupChats = groups.filter(g=>g.members&&g.members.includes(currentUser));
            return `<div class="chat-list"><div class="settings-title">➕ СОЗДАТЬ</div><div class="chat-item" onclick="showCreateGroupModal()"><div class="chat-avatar">➕</div><div class="chat-info"><div class="chat-name">Новая группа</div></div></div><div class="settings-title">👥 ГРУППЫ (${groupChats.length})</div>${groupChats.map(g=>`<div class="chat-item" onclick="openGroupChat('${g.id}','${escapeHtml(g.name)}')"><div class="chat-avatar">#</div><div class="chat-info"><div class="chat-name">${isPinned({type:'group',id:g.id})?'📌 ':''}${escapeHtml(g.name)} ${g.password?'🔒':''}</div><div class="chat-preview">${g.members.length} уч.</div></div><div style="display:flex;gap:3px;"><button class="icon-btn" onclick="event.stopPropagation();inviteToGroup('${g.id}')" style="font-size:12px;">👥</button>${g.owner===currentUser?`<button class="icon-btn" onclick="event.stopPropagation();deleteGroup('${g.id}')" style="font-size:12px;">🗑️</button>`:`<button class="icon-btn" onclick="event.stopPropagation();leaveGroup('${g.id}')" style="font-size:12px;">🚪</button>`}<button class="icon-btn" onclick="event.stopPropagation();togglePin({type:'group',id:'${g.id}'})" style="font-size:12px;">📌</button></div></div>`).join('')||'<div>Нет групп</div>'}<div class="settings-title">💬 ЛИЧНЫЕ (${privateChats.length})</div>${privateChats.map(user=>`<div class="chat-item" onclick="openPrivateChat('${user}')"><div class="chat-avatar">${getAvatarHtml(user)}</div><div class="chat-info"><div class="chat-name">${isPinned({type:'private',user})?'📌 ':''}${escapeHtml(user)} ${contacts.find(c=>c.name===user)?.online?'<span class="online-dot"></span>':''}</div><div class="chat-preview">${allMessages.filter(m=>(m.from===user||m.to===user)&&!m.isGroup).slice(-1)[0]?.text?.slice(0,30)||'Нет сообщений'}</div></div><button class="icon-btn" onclick="event.stopPropagation();togglePin({type:'private',user:'${user}'})">📌</button></div>`).join('')||'<div>Нет чатов</div>'}</div>`;
        }
        
        function renderContacts() {
            const online = contacts.filter(c=>c.online&&c.name!==currentUser);
            const offline = contacts.filter(c=>!c.online&&c.name!==currentUser);
            return `<div class="settings-section"><div class="settings-title">➕ ДОБАВИТЬ</div><div style="display:flex;gap:8px;"><input type="text" id="contactName" placeholder="Имя" style="flex:1;padding:10px;border:1px solid var(--border);border-radius:30px;"><button class="send-btn" onclick="addContact()">Добавить</button></div></div><div class="settings-section"><div class="settings-title">🟢 ОНЛАЙН (${online.length})</div>${online.map(c=>`<div class="chat-item" onclick="openPrivateChat('${c.name}')"><div class="chat-avatar">${getAvatarHtml(c.name)}</div><div class="chat-info"><div class="chat-name">${escapeHtml(c.name)}<span class="online-dot"></span></div></div><button class="icon-btn" onclick="event.stopPropagation();startCall('${c.name}',false)">🎤</button><button class="icon-btn" onclick="event.stopPropagation();startCall('${c.name}',true)">📹</button></div>`).join('')||'<div>Никого нет</div>'}</div><div class="settings-section"><div class="settings-title">⚫ ОФЛАЙН (${offline.length})</div>${offline.map(c=>`<div class="chat-item" onclick="openPrivateChat('${c.name}')"><div class="chat-avatar">${getAvatarHtml(c.name)}</div><div class="chat-info"><div class="chat-name">${escapeHtml(c.name)}</div></div></div>`).join('')||'<div>Нет контактов</div>'}</div>`;
        }
        
        function renderSearch() {
            const q = searchQuery.toLowerCase();
            const found = allMessages.filter(m=>m.text&&m.text.toLowerCase().includes(q)&&(!m.isGroup?(m.from===currentUser||m.to===currentUser):groups.find(g=>g.id===m.groupId)?.members?.includes(currentUser))).slice(-30);
            return `<div class="search-bar"><input type="text" placeholder="🔍 Поиск..." oninput="searchMessages(this.value)" autofocus></div><div class="settings-title" style="margin:12px;">📝 Найдено: ${found.length}</div><div class="chat-list">${found.map((m,i)=>`<div class="chat-item" onclick="openChatFromSearch(${i})" data-msg='${JSON.stringify(m)}'><div class="chat-avatar">${m.from===currentUser?'📤':'📥'}</div><div class="chat-info"><div class="chat-name">${escapeHtml(m.from)} → ${m.isGroup?'группа':m.to}</div><div class="chat-preview">${escapeHtml(m.text?.slice(0,40)||'📷')}</div></div></div>`).join('')||'<div>Ничего не найдено</div>'}</div>`;
        }
        
        function renderStats() {
            const my = allMessages.filter(m=>m.from===currentUser);
            return `<div class="settings-section"><div class="settings-title">📊 СТАТИСТИКА</div><div class="setting-item"><span>📨 Сообщений</span><span><strong>${my.length}</strong></span></div><div class="setting-item"><span>👥 Групп</span><span><strong>${groups.filter(g=>g.members?.includes(currentUser)).length}</strong></span></div><div class="setting-item"><span>👤 Контактов</span><span><strong>${contacts.length}</strong></span></div></div>`;
        }
        
        function renderSettings() {
            return `<div class="settings-section"><div class="settings-title">👤 АККАУНТ</div><div class="setting-item"><span>НИК</span><span style="color:var(--primary);">${escapeHtml(currentUser)}</span></div><div class="setting-item"><button class="send-btn" style="width:100%;" onclick="renameAccount()">✏️ Переименовать</button></div><div class="setting-item"><button class="send-btn" style="width:100%;background:var(--danger);" onclick="deleteAccount()">🗑️ Удалить</button></div><div class="setting-item"><button class="send-btn" style="width:100%;" onclick="openAvatarModal()">🖼️ Аватарка</button></div><div class="setting-item"><button class="send-btn" style="width:100%;" onclick="showMyQR()">📱 QR-код</button></div></div><div class="settings-section"><div class="settings-title">🎨 ТЕМЫ</div><div class="theme-buttons"><div class="theme-btn" style="background:linear-gradient(135deg,#667eea,#764ba2);" onclick="setTheme('purple')"></div><div class="theme-btn" style="background:linear-gradient(135deg,#0f0f1a,#1a1a2e);" onclick="setTheme('dark')"></div><div class="theme-btn" style="background:linear-gradient(135deg,#00c6fb,#005bea);" onclick="setTheme('ocean')"></div><div class="theme-btn" style="background:linear-gradient(135deg,#f093fb,#f5576c);" onclick="setTheme('sunset')"></div><div class="theme-btn" style="background:linear-gradient(135deg,#11998e,#38ef7d);" onclick="setTheme('forest')"></div></div></div>`;
        }
        
        function displayMessages() {
            const c = document.getElementById('messagesArea');
            if(!c) return;
            let f = [];
            if(currentChat?.type==='private') f = allMessages.filter(m=>!m.isGroup&&((m.from===currentUser&&m.to===currentChat.user)||(m.from===currentChat.user&&m.to===currentUser)));
            else if(currentChat?.type==='group') f = allMessages.filter(m=>m.isGroup&&m.groupId===currentChat.id);
            c.innerHTML = f.map(msg=>`<div class="message ${msg.from===currentUser?'my':'other'}"><div class="message-bubble">${msg.from!==currentUser?`<div class="message-sender">${escapeHtml(msg.from)}</div>`:''}${msg.text?`<div class="message-text">${escapeHtml(msg.text)}</div>`:''}${msg.image?`<img src="${msg.image}" class="message-image" onclick="window.open('${msg.image}')">`:''}${msg.audio?`<audio controls style="max-width:180px;"><source src="${msg.audio}"></audio>`:''}<div class="message-time">${new Date(msg.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div></div>`).join('');
            c.scrollTop = c.scrollHeight;
        }
        
        function sendSticker(s) { if(!currentChat) return; const msg = { type: currentChat.type==='private'?'message':'group_message', text: s }; if(currentChat.type==='private') msg.to = currentChat.user; else msg.groupId = currentChat.id; ws.send(JSON.stringify(msg)); showConfetti(); document.getElementById('stickerPanel')?.classList.remove('show'); }
        function toggleStickers() { document.getElementById('stickerPanel')?.classList.toggle('show'); }
        function openChatFromSearch(i) { const items = document.querySelectorAll('.chat-item[data-msg]'); if(items[i]) { const msg = JSON.parse(items[i].getAttribute('data-msg')); if(msg.isGroup) openGroupChat(msg.groupId,''); else openPrivateChat(msg.from===currentUser?msg.to:msg.from); } }
        function setTab(t) { currentTab = t; if(t!=='chats') currentChat = null; render(); }
        function closeChat() { currentChat = null; render(); }
        function openPrivateChat(u) { currentChat = { type:'private', user:u }; render(); }
        function openGroupChat(id,name) { currentChat = { type:'group', id, name }; render(); }
        function addContact() { const n = document.getElementById('contactName')?.value.trim(); if(!n) return; ws.send(JSON.stringify({ type:'add_contact', contactName:n })); document.getElementById('contactName').value = ''; }
        function showCreateGroupModal() { const name = prompt('Название:'); if(!name) return; const pass = confirm('Пароль?') ? prompt('Пароль:') : null; ws.send(JSON.stringify({ type:'create_group', groupName:name, password:pass })); }
        function deleteGroup(id) { if(confirm('Удалить группу?')) ws.send(JSON.stringify({ type:'delete_group', groupId:id })); }
        function leaveGroup(id) { if(confirm('Покинуть группу?')) ws.send(JSON.stringify({ type:'leave_group', groupId:id })); }
        function inviteToGroup(id) { const n = prompt('Имя:'); if(!n) return; ws.send(JSON.stringify({ type:'invite_to_group', groupId:id, userToInvite:n })); showToast(`📨 Приглашение ${n}`); }
        function sendMessage() { const inp = document.getElementById('messageInput'); const txt = inp?.value.trim(); if(!txt&&!currentImage) return; if(!currentChat) return; const msg = { type: currentChat.type==='private'?'message':'group_message', text: txt||'' }; if(currentChat.type==='private') msg.to = currentChat.user; else msg.groupId = currentChat.id; if(currentImage) msg.image = currentImage; ws.send(JSON.stringify(msg)); if(inp) inp.value = ''; currentImage = null; showConfetti(); }
        async function attachImage() { const inp = document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.onchange=async(e)=>{ const f=e.target.files[0]; if(!f) return; const fd=new FormData(); fd.append('file',f); const res=await fetch('/upload',{method:'POST',body:fd}); const d=await res.json(); currentImage=d.url; sendMessage(); }; inp.click(); }
        function onTyping() { if(currentChat?.type==='private') ws.send(JSON.stringify({ type:'typing', to:currentChat.user })); }
        
        let customStickers = JSON.parse(localStorage.getItem('customStickers')||'[]');
        function openStickerCreator() { const m=document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content"><h3>🎨 СТИКЕР</h3><input type="text" id="stickerEmoji" placeholder="😀 или текст"><input type="file" id="stickerImage" accept="image/*" style="margin:10px 0;"><button class="send-btn" onclick="addCustomSticker()">➕ Добавить</button><hr><div id="customStickersList" style="display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;"></div><button class="send-btn" onclick="this.closest('.modal').remove()">Закрыть</button></div>`; document.body.appendChild(m); renderCustomStickersList(); }
        function renderCustomStickersList() { const c=document.getElementById('customStickersList'); if(!c) return; c.innerHTML=customStickers.map((s,i)=>`<div><div onclick="sendCustomSticker(${i})" style="cursor:pointer;">${s.image?`<img src="${s.image}" style="width:50px;height:50px;border-radius:10px;">`: `<span style="font-size:40px;">${s.emoji}</span>`}</div><button onclick="deleteCustomSticker(${i})" style="font-size:10px;">🗑️</button></div>`).join(''); }
        function addCustomSticker() { const e=document.getElementById('stickerEmoji')?.value; const f=document.getElementById('stickerImage')?.files[0]; if(f){ const r=new FileReader(); r.onload=()=>{ customStickers.push({image:r.result,emoji:null}); localStorage.setItem('customStickers',JSON.stringify(customStickers)); renderCustomStickersList(); showToast('✅ Стикер добавлен'); }; r.readAsDataURL(f); } else if(e){ customStickers.push({emoji:e,image:null}); localStorage.setItem('customStickers',JSON.stringify(customStickers)); renderCustomStickersList(); showToast('✅ Стикер добавлен'); } }
        function deleteCustomSticker(i){ customStickers.splice(i,1); localStorage.setItem('customStickers',JSON.stringify(customStickers)); renderCustomStickersList(); }
        function sendCustomSticker(i){ const s=customStickers[i]; if(!currentChat) return; const msg={ type:currentChat.type==='private'?'message':'group_message', text:s.emoji||'🖼️', image:s.image||null }; if(currentChat.type==='private') msg.to=currentChat.user; else msg.groupId=currentChat.id; ws.send(JSON.stringify(msg)); document.querySelector('.modal')?.remove(); showConfetti(); }
        
        async function startCall(userId,video){
            try{ const m={audio:true, video:video?{width:640,height:480}:false}; localStream=await navigator.mediaDevices.getUserMedia(m); currentCallWith=userId; currentCallId=Date.now().toString(); peerConnection=new RTCPeerConnection(configuration); localStream.getTracks().forEach(t=>peerConnection.addTrack(t,localStream)); peerConnection.onicecandidate=e=>{if(e.candidate) ws.send(JSON.stringify({type:'ice_candidate',to:userId,candidate:e.candidate,callId:currentCallId}));}; peerConnection.ontrack=e=>{if(e.streams[0]){const rv=document.getElementById('remoteVideo');if(rv&&e.track.kind==='video') rv.srcObject=e.streams[0]; const ra=document.getElementById('remoteAudio');if(ra) ra.srcObject=e.streams[0];}}; const offer=await peerConnection.createOffer({offerToReceiveAudio:true,offerToReceiveVideo:video}); await peerConnection.setLocalDescription(offer); ws.send(JSON.stringify({type:'call_offer',to:userId,offer:peerConnection.localDescription,callId:currentCallId,video})); showCallUI(video,true); showToast(`📞 Звоним ${userId}...`); } catch(e){ showToast('❌ Нет доступа к камере/микрофону'); endCall(); } }
        async function startGroupCall(groupId,video){
            try{ const m={audio:true, video:video?{width:640,height:480}:false}; localStream=await navigator.mediaDevices.getUserMedia(m); currentCallId=Date.now().toString(); peerConnection=new RTCPeerConnection(configuration); localStream.getTracks().forEach(t=>peerConnection.addTrack(t,localStream)); const offer=await peerConnection.createOffer({offerToReceiveAudio:true,offerToReceiveVideo:video}); await peerConnection.setLocalDescription(offer); ws.send(JSON.stringify({type:'group_call_offer',groupId,offer:peerConnection.localDescription,callId:currentCallId,video})); showCallUI(video,true); showToast(`📞 Групповой звонок`); } catch(e){ showToast('❌ Нет доступа'); } }
        async function answerCall(from,offer,callId,video){ currentCallWith=from; currentCallId=callId; try{ const m={audio:true, video:video?{width:640,height:480}:false}; localStream=await navigator.mediaDevices.getUserMedia(m); peerConnection=new RTCPeerConnection(configuration); localStream.getTracks().forEach(t=>peerConnection.addTrack(t,localStream)); peerConnection.onicecandidate=e=>{if(e.candidate) ws.send(JSON.stringify({type:'ice_candidate',to:from,candidate:e.candidate,callId}));}; peerConnection.ontrack=e=>{if(e.streams[0]){const rv=document.getElementById('remoteVideo');if(rv&&e.track.kind==='video') rv.srcObject=e.streams[0]; const ra=document.getElementById('remoteAudio');if(ra) ra.srcObject=e.streams[0];}}; await peerConnection.setRemoteDescription(new RTCSessionDescription(offer)); const ans=await peerConnection.createAnswer({offerToReceiveAudio:true,offerToReceiveVideo:video}); await peerConnection.setLocalDescription(ans); ws.send(JSON.stringify({type:'call_answer',to:from,answer:peerConnection.localDescription,callId})); showCallUI(video,false); } catch(e){ endCall(); } }
        async function handleAnswer(a){ if(peerConnection&&peerConnection.currentRemoteDescription===null) await peerConnection.setRemoteDescription(new RTCSessionDescription(a)); }
        async function handleIceCandidate(c){ if(peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(c)); }
        function endCall(){ if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; } if(peerConnection){ peerConnection.close(); peerConnection=null; } if(currentCallWith){ ws.send(JSON.stringify({type:'end_call',to:currentCallWith})); currentCallWith=null; } document.getElementById('callModal')?.remove(); showToast('🔴 Звонок завершён'); }
        function showCallUI(v){ const m=document.createElement('div'); m.id='callModal'; m.className='call-modal'; m.innerHTML=v?`<div style="display:flex;gap:15px;"><video id="localVideo" autoplay muted playsinline style="width:260px;border-radius:18px;"></video><video id="remoteVideo" autoplay playsinline style="width:260px;border-radius:18px;"></video></div><audio id="remoteAudio" autoplay></audio><button onclick="endCall()" style="background:#f56565;border:none;padding:14px 28px;border-radius:50px;color:white;margin-top:16px;">🔴 Завершить</button>`:`<div style="text-align:center;"><div style="font-size:70px;">🎤</div><h2>Аудиозвонок</h2><audio id="remoteAudio" autoplay></audio><button onclick="endCall()" style="background:#f56565;border:none;padding:14px 28px;border-radius:50px;color:white;margin-top:16px;">🔴 Завершить</button></div>`; document.body.appendChild(m); const lv=document.getElementById('localVideo'); if(lv&&localStream) lv.srcObject=localStream; }
        function showIncomingCall(from,offer,callId,video){ const m=document.createElement('div'); m.id='callModal'; m.className='call-modal'; m.innerHTML=`<h2 style="color:white;margin-bottom:16px;">📞 ${from} ${video?'видеозвонит':'звонит'}</h2><div style="display:flex;gap:16px;"><button onclick="window._accept()" style="background:#48bb78;border:none;width:65px;height:65px;border-radius:50%;font-size:28px;">✅</button><button onclick="window._reject()" style="background:#f56565;border:none;width:65px;height:65px;border-radius:50%;font-size:28px;">❌</button></div>`; document.body.appendChild(m); window._accept=()=>{m.remove(); answerCall(from,offer,callId,video);}; window._reject=()=>{m.remove(); ws.send(JSON.stringify({type:'end_call',to:from})); showToast('❌ Звонок отклонён');}; }
        
        function renameAccount(){ const n=prompt('Новое имя:',currentUser); if(!n) return; const BAD=['бля','хуй','пизд','еблан','пидор']; if(BAD.some(w=>n.toLowerCase().includes(w))){ showToast('❌ Запрещённое имя'); return; } if(n.length<2){ showToast('❌ Слишком короткое'); return; } currentUser=n; localStorage.setItem('messenger_user',n); if(ws) ws.close(); connectWebSocket(); showToast(`✅ Имя изменено на ${n}`); }
        function deleteAccount(){ if(confirm('Удалить аккаунт? Все данные будут потеряны!')){ localStorage.removeItem('messenger_user'); if(ws) ws.close(); currentUser=''; render(); showToast('🗑️ Аккаунт удалён'); } }
        function login(){ const n=document.getElementById('loginName').value.trim(); const BAD=['бля','хуй','пизд','еблан','пидор']; if(BAD.some(w=>n.toLowerCase().includes(w))){ showToast('❌ Выбери нормальное имя!'); return; } if(!n||n.length<2){ showToast('❌ Имя слишком короткое'); return; } currentUser=n; localStorage.setItem('messenger_user',n); connectWebSocket(); }
        function openAvatarModal(){ const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.onchange=async(e)=>{ const f=e.target.files[0]; if(!f) return; const fd=new FormData(); fd.append('avatar',f); fd.append('userId',currentUser); const res=await fetch('/upload-avatar',{method:'POST',body:fd}); const d=await res.json(); if(d.url){ showToast('✅ Аватарка обновлена'); render(); } }; inp.click(); }
        function showUserQR(u){ const m=document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content"><h3>📱 QR-КОД</h3><div class="qr-code">${escapeHtml(u)}</div><button class="send-btn" onclick="this.closest('.modal').remove()">Закрыть</button></div>`; document.body.appendChild(m); }
        function showMyQR(){ showUserQR(currentUser); }
        function searchMessages(q){ searchQuery=q; render(); }
        function sendVoice() { showToast('🎤 Голосовые сообщения скоро!'); }
        
        function connectWebSocket(){
            const proto=location.protocol==='https:'?'wss:':'ws:';
            ws=new WebSocket(`${proto}//${location.host}`);
            ws.onopen=()=>ws.send(JSON.stringify({type:'auth',userId:currentUser}));
            ws.onmessage=(e)=>{
                const d=JSON.parse(e.data);
                if(d.type==='history'){ allMessages=d.messages; render(); }
                else if(d.type==='groups_list'){ groups=d.groups; render(); }
                else if(d.type==='contacts_list'){ contacts=d.contacts; render(); }
                else if(d.type==='message'||d.type==='group_message'){ 
                    allMessages.push(d); render(); if(currentChat) displayMessages(); 
                    if(d.from!==currentUser){ showToast(`${d.from}: ${d.text?.slice(0,25)||'📷'}`); showNotif(`${d.from}`, d.text?.slice(0,40)||'📷'); }
                }
                else if(d.type==='typing'){ const ind=document.getElementById('typingIndicator'); if(ind) ind.innerText=`${d.from} печатает...`; setTimeout(()=>{if(ind) ind.innerText='';},2000); }
                else if(d.type==='avatar_update'){ const c=contacts.find(c=>c.name===d.userId); if(c) c.avatar=d.avatar; render(); }
                else if(d.type==='online_list'){ d.users.forEach(u=>{ if(u!==currentUser){ const c=contacts.find(c=>c.name===u); if(c) c.online=true; else contacts.push({name:u,online:true,avatar:null}); } }); render(); }
                else if(d.type==='user_online'){ const c=contacts.find(c=>c.name===d.userId); if(c) c.online=true; else if(d.userId!==currentUser) contacts.push({name:d.userId,online:true,avatar:null}); render(); if(d.userId!==currentUser) showToast(`🟢 ${d.userId} в сети`); }
                else if(d.type==='user_offline'){ const c=contacts.find(c=>c.name===d.userId); if(c) c.online=false; render(); }
                else if(d.type==='call_offer'){ showIncomingCall(d.from,d.offer,d.callId,d.video); }
                else if(d.type==='call_answer'){ handleAnswer(d.answer); }
                else if(d.type==='ice_candidate'){ handleIceCandidate(d.candidate); }
                else if(d.type==='end_call'){ endCall(); showToast('📞 Звонок завершён'); }
                else if(d.type==='group_call_offer'){ if(confirm(`${d.from} начал групповой звонок. Присоединиться?`)){ answerCall(d.from,d.offer,d.callId,d.video); } }
                else if(d.type==='join_success'){ showToast(`✅ В группе ${d.groupName}`); }
                else if(d.type==='group_invite'){ if(confirm(`${d.from} приглашает в группу "${d.groupName}". Присоединиться?`)){ ws.send(JSON.stringify({type:'accept_group_invite',groupId:d.groupId})); } }
                else if(d.type==='invite_sent'){ showToast(`✅ Приглашение отправлено ${d.to}`); }
                else if(d.type==='group_joined'){ showToast(`✅ Вы в группе ${d.groupName}`); ws.send(JSON.stringify({type:'auth',userId:currentUser})); }
                else if(d.type==='contact_added'){ showToast(`➕ ${d.contact} добавлен`); ws.send(JSON.stringify({type:'auth',userId:currentUser})); }
                else if(d.type==='contact_request'){ if(confirm(`${d.from} хочет добавить в друзья. Принять?`)){ ws.send(JSON.stringify({type:'add_contact',contactName:d.from})); } }
                else if(d.type==='group_created'){ showToast(`✅ Группа создана`); ws.send(JSON.stringify({type:'auth',userId:currentUser})); }
                else if(d.type==='error'){ showToast(`❌ ${d.error}`); }
                else if(d.type==='auth_error'){ showToast(`❌ ${d.error}`); if(d.error.includes('имя')){ currentUser=''; localStorage.removeItem('messenger_user'); render(); } }
                else if(d.type==='left_group'){ if(currentChat?.type==='group'&&currentChat.id===d.groupId) closeChat(); render(); }
                else if(d.type==='group_deleted'){ if(currentChat?.type==='group'&&currentChat.id===d.groupId) closeChat(); render(); }
            };
        }
        
        const savedTheme = localStorage.getItem('theme');
        if(savedTheme) setTheme(savedTheme);
        else setTheme('purple');
        
        const savedUser = localStorage.getItem('messenger_user');
        if(savedUser) { currentUser = savedUser; connectWebSocket(); } else { render(); }
        
        window.setTab = setTab; window.closeChat = closeChat; window.openPrivateChat = openPrivateChat; window.openGroupChat = openGroupChat;
        window.showCreateGroupModal = showCreateGroupModal; window.deleteGroup = deleteGroup; window.leaveGroup = leaveGroup; window.sendMessage = sendMessage;
        window.attachImage = attachImage; window.login = login; window.setTheme = setTheme; window.toggleStickers = toggleStickers; window.sendSticker = sendSticker;
        window.addContact = addContact; window.renameAccount = renameAccount; window.deleteAccount = deleteAccount; window.togglePin = togglePin;
        window.showUserQR = showUserQR; window.showMyQR = showMyQR; window.openAvatarModal = openAvatarModal; window.searchMessages = searchMessages;
        window.openChatFromSearch = openChatFromSearch; window.addReaction = function(){}; window.sendVoice = sendVoice; window.getAvatarHtml = getAvatarHtml;
        window.startCall = startCall; window.endCall = endCall; window.inviteToGroup = inviteToGroup; window.startGroupCall = startGroupCall;
        window.openStickerCreator = openStickerCreator; window.addCustomSticker = addCustomSticker; window.deleteCustomSticker = deleteCustomSticker;
        window.sendCustomSticker = sendCustomSticker;
    </script>
</body>
</html>
